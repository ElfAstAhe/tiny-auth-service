edition = "2023";

package auth.service;

option go_package = "tiny-auth-service/grpc/tiny-auth-service";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service UserService {
  // info
  rpc Profile(google.protobuf.Empty) returns (ProfileResponse);
  // change password
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  // change keys
  rpc ChangeKeys(google.protobuf.Empty) returns (ChangeKeysResponse);
}

message ChangePasswordRequest {
  string old_password = 1;
  string new_password = 2;
}

message ProfileResponse {
  string id = 1;
  string name = 2;
  string public_key = 3;
  bool active = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  repeated string roles = 7;
}

message ChangeKeysResponse {
  string public_key = 1;
  string private_key = 2;
}
